<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BookWorm Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Georgia', serif;
      background: #FBF7F0;
      color: #2C1810;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(74, 44, 42, 0.10);
      border: 1px solid #E0D3C8;
      text-align: center;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #4A2C2A;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 1rem;
      color: #C9A96E;
      font-style: italic;
      margin-bottom: 32px;
      font-weight: 500;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #C9A96E;
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: #7A6055;
      margin-bottom: 28px;
    }

    .email-btn {
      display: inline-block;
      background: #4A2C2A;
      color: #FBF7F0;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      transition: background 0.2s;
    }

    .email-btn:hover {
      background: #7B4F4C;
    }

    .note {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #B8A99A;
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #B8A99A;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚</div>
    <h1>BookWorm</h1>
    <p class="tagline">Tu camino lector, registrado.</p>
    <div class="divider"></div>
    <p>
      Need help, have a question, or want to report an issue?<br/>
      We're happy to assist you.
    </p>
    <a class="email-btn" href="mailto:support.bookworm@gmail.com">
      ✉️ &nbsp;support.bookworm@gmail.com
    </a>
    <p class="note">We'll get back to you as soon as possible.</p>
  </div>
  <footer>© 2026 BookWorm. All rights reserved.</footer>
</body>
</html>
